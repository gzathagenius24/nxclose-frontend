<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NxClose — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0d0e13; --cream: #f7f4ee; --gold: #c9a84c;
    --sage: #3d5c4a; --warm: #fdfbf7; --mid: #6b7280;
    --error: #dc2626; --success: #16a34a;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: var(--warm); border-radius: 20px; padding: 3rem; width: 100%; max-width: 420px; }
  .brand { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 900; color: var(--ink); text-decoration: none; display: block; text-align: center; margin-bottom: 2rem; }
  .brand span { color: var(--gold); }
  .form-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--ink); margin-bottom: 0.4rem; }
  .form-sub { font-size: 0.875rem; color: var(--mid); margin-bottom: 1.75rem; line-height: 1.6; }
  .field-group { margin-bottom: 1.25rem; }
  .field-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--ink); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .field-input { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid rgba(13,14,19,0.12); border-radius: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; background: white; color: var(--ink); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  .submit-btn { width: 100%; padding: 0.9rem; background: var(--ink); color: var(--cream); border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .submit-btn:hover { background: var(--sage); transform: translateY(-1px); }
  .submit-btn:disabled { background: #9ca3af; transform: none; cursor: not-allowed; }
  .submit-btn.loading { pointer-events: none; }
  .spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(247,244,238,0.3); border-top-color: var(--cream); animation: spin 0.7s linear infinite; display: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .alert { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; line-height: 1.5; }
  .alert.show { display: block; }
  .alert.error { background: rgba(220,38,38,0.08); color: var(--error); border: 1px solid rgba(220,38,38,0.2); }
  .alert.success { background: rgba(22,163,74,0.08); color: var(--success); border: 1px solid rgba(22,163,74,0.2); }
  .strength-bar { height: 4px; border-radius: 2px; background: #e5e7eb; margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
  .strength-label { font-size: 0.75rem; color: var(--mid); margin-top: 4px; }
  .invalid-card { text-align: center; padding: 1rem 0; }
  .invalid-card p { color: var(--mid); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .back-link { text-align: center; font-size: 0.85rem; color: var(--mid); margin-top: 1.25rem; }
  .back-link a { color: var(--ink); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>
<body>
<div class="card">
  <a href="login.html" class="brand">Nx<span>Close</span></a>

  <!-- Invalid token state -->
  <div id="invalid-view" style="display:none;">
    <div class="invalid-card">
      <h2 class="form-title" style="margin-bottom:0.75rem;">Link Invalid or Expired</h2>
      <p>This password reset link is no longer valid. Reset links expire after 1 hour.</p>
      <a href="forgot-password.html" style="display:inline-block;background:var(--ink);color:var(--cream);padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem;">Request New Link</a>
    </div>
  </div>

  <!-- Reset form -->
  <div id="reset-view" style="display:none;">
    <h2 class="form-title">Set new password</h2>
    <p class="form-sub">Choose a strong password for your NxClose account.</p>

    <div class="alert" id="alert"></div>

    <div class="field-group">
      <label class="field-label">New Password</label>
      <input type="password" class="field-input" id="password" placeholder="Minimum 8 characters" oninput="checkStrength()" autocomplete="new-password"/>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field-group">
      <label class="field-label">Confirm Password</label>
      <input type="password" class="field-input" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="handleReset()">
      <div class="spinner"></div>
      <span class="btn-text">Reset Password →</span>
    </button>

    <div class="back-link"><a href="login.html">← Back to sign in</a></div>
  </div>
</div>

<script>
  const API   = 'https://nexclose-backend-production.up.railway.app';
  const token = new URLSearchParams(window.location.search).get('token');

  // Show invalid if no token
  if (!token) {
    document.getElementById('invalid-view').style.display = 'block';
  } else {
    document.getElementById('reset-view').style.display = 'block';
  }

  function checkStrength() {
    const pw   = document.getElementById('password').value;
    const fill = document.getElementById('strength-fill');
    const lbl  = document.getElementById('strength-label');
    let score  = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { pct: '20%', color: '#ef4444', label: 'Very weak' },
      { pct: '40%', color: '#f97316', label: 'Weak' },
      { pct: '60%', color: '#eab308', label: 'Fair' },
      { pct: '80%', color: '#22c55e', label: 'Strong' },
      { pct: '100%', color: '#16a34a', label: 'Very strong' },
    ];
    const lvl = levels[Math.max(0, score - 1)] || levels[0];
    fill.style.width      = pw.length ? lvl.pct : '0%';
    fill.style.background = lvl.color;
    lbl.textContent       = pw.length ? lvl.label : '';
  }

  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    clearAlert();

    if (password.length < 8) return showAlert('Password must be at least 8 characters.', 'error');
    if (password !== confirm) return showAlert('Passwords do not match.', 'error');

    const btn = document.getElementById('submit-btn');
    btn.classList.add('loading'); btn.disabled = true;

    try {
      const res  = await fetch(`${API}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 400 && data.error?.includes('expired')) {
          document.getElementById('reset-view').style.display   = 'none';
          document.getElementById('invalid-view').style.display = 'block';
          return;
        }
        return showAlert(data.error || 'Reset failed. Please try again.', 'error');
      }
      showAlert('Password reset! Redirecting to sign in...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch { showAlert('Connection error. Please try again.', 'error'); }
    finally { btn.classList.remove('loading'); btn.disabled = false; }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }
  function clearAlert() { document.getElementById('alert').className = 'alert'; }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
